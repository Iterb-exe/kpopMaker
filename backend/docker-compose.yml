name: kpop-turniej

services:
  postgres:
    image: postgres:16-alpine
    container_name: kpop-postgres
    # Docker automatycznie zassie stąd POSTGRES_PASSWORD, POSTGRES_USER i POSTGRES_DB
    env_file:
      - .env 
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kpop-tournament:
    build: .
    container_name: kpop-app
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma db push && node server.js"
    env_file: 
      - .env
    environment:
      - NODE_ENV=production

volumes:
  postgres_data: